kind = "web"
previewPath = "/"
title = "$CHEBU — The People's Meme"
version = "1.0.0"
id = "artifacts/chebu"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19298

[services.development]
run = "pnpm --filter @workspace/chebu run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/chebu", "run", "build" ]
publicDir = "artifacts/chebu/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19298"
BASE_PATH = "/"
